<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MTA C&D Org Chart</title>
<script src="https://cdn.tailwindcss.com"></script>
    <script>
      // Configure Tailwind CSS to use the 'class' strategy for dark mode.
      // This must be defined *after* the Tailwind script is loaded.
      tailwind.config = {
        darkMode: 'class'
      }
    </script>
    <style>
      @keyframes pulse-highlight {
        0%, 100% {
          transform: scale(1);
          box-shadow: 0 0 0 0px rgba(251, 191, 36, 0.7); /* amber-400 */
        }
        50% {
          transform: scale(1.03);
          box-shadow: 0 0 0 12px rgba(251, 191, 36, 0);
        }
      }
      .animate-pulse-highlight {
        animation: pulse-highlight 2s infinite cubic-bezier(0.4, 0, 0.6, 1);
      }
    </style>
</head>
  <body class="bg-slate-100 dark:bg-slate-900">
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
</body>
</html>
